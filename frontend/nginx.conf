# Serve the SPA and proxy API calls to the backend container (same-origin → no CORS).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Static assets with long cache; HTML always revalidated.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all client routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/<x>  →  backend:8787/<x>   (trailing slash strips the /api prefix)
    location /api/ {
        proxy_pass http://backend:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
    }
}
