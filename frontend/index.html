<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#0A0A0C" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='32'%20y2='32'%20gradientUnits='userSpaceOnUse'%3E%3Cstop%20stop-color='%23FF3D81'/%3E%3Cstop%20offset='.5'%20stop-color='%237A5CFF'/%3E%3Cstop%20offset='1'%20stop-color='%2328E0C8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='32'%20height='32'%20rx='8'%20fill='url(%23g)'/%3E%3Cpath%20d='M9%2012h14M11%2016h12M9%2020h14'%20stroke='white'%20stroke-width='2.2'%20stroke-linecap='round'/%3E%3C/svg%3E" />
    <title>QueueStorm — Intelligent ticket triage for digital finance</title>
    <meta
      name="description"
      content="QueueStorm reads the storm of customer tickets and routes each one in milliseconds. We read the storm. You read one sentence."
    />
    <!-- Fonts: Fontshare (Clash Display, Satoshi) + Google (Fraunces, JetBrains Mono, Hind Siliguri/Bangla) -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Critical above-the-fold faces (headline + body): block briefly to avoid FOUT. -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <!-- Secondary faces (serif numerals, mono data, Bangla): load non-blocking so
         they never delay first paint; each has a system fallback in the stack. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=JetBrains+Mono:wght@400;500&family=Hind+Siliguri:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=JetBrains+Mono:wght@400;500&family=Hind+Siliguri:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
